<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grace in Bloom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="arrival-page">
  <main class="arrival-screen">
    <section class="arrival-card">
      <h1>Welcome to Grace in Bloom</h1>
      <p>Before you enter, choose who will walk into Grace in Bloom with you.</p>

      <div class="character-grid">
        <button class="character-card" data-character="girl">👧<span>Girl</span></button>
        <button class="character-card" data-character="boy">👦<span>Boy</span></button>
        <button class="character-card" data-character="teen-girl">🌸<span>Teen Girl</span></button>
        <button class="character-card" data-character="teen-boy">🌲<span>Teen Boy</span></button>
        <button class="character-card" data-character="woman">👩<span>Woman</span></button>
        <button class="character-card" data-character="man">👨<span>Man</span></button>
      </div>

      <label class="field">
        Name your character
        <input id="characterName" type="text" placeholder="Example: Lily, Grace, Noah">
      </label>

      <div class="birthday-box">
        <p>Birthday optional</p>
        <select id="birthMonth">
          <option value="">Month</option>
          <option>January</option><option>February</option><option>March</option><option>April</option>
          <option>May</option><option>June</option><option>July</option><option>August</option>
          <option>September</option><option>October</option><option>November</option><option>December</option>
        </select>
        <input id="birthDay" type="number" min="1" max="31" placeholder="Day">
        <input id="birthYear" type="number" placeholder="Year">
      </div>

      <button class="enter-button" id="enterGrace">Enter Grace in Bloom</button>
      <button class="skip-button" id="skipSetup">Skip for now</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
